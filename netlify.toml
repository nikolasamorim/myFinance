[build]
  command = "npm run build:web"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ── Cutover: domínio antigo (azami-app.netlify.app) → domínio próprio ─────────
# Mantém os Functions acessíveis no domínio antigo para NÃO derrubar os webhooks
# da Pluggy de conexões já existentes (que ainda apontam para o netlify.app).
[[redirects]]
  from = "https://azami-app.netlify.app/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Todo o resto do domínio antigo é redirecionado (301) para o domínio próprio.
[[redirects]]
  from = "https://azami-app.netlify.app/*"
  to = "https://app.azamifinanceiro.com/:splat"
  status = 301
  force = true

# Rotas da API → Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# Banking (Pluggy) — standalone Netlify Functions
[[redirects]]
  from = "/banking/*"
  to = "/.netlify/functions/banking-:splat"
  status = 200

# SPA fallback — necessário para React Router funcionar em produção
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
